version: "3.8"
services:
  app:
    container_name: hris_container
    restart: unless-stopped
    build:
      context: ./
      dockerfile: ./docker/app.dockerfile
    volumes:
      - ./:/var/www/app
      - vendor_volume:/var/www/app/vendor
    networks:
      - localNetwork
    extra_hosts:
      - "host.docker.internal:host-gateway"
  postgres:
    container_name: hris_postgres
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: hris_db
      POSTGRES_USER: hris_user
      POSTGRES_PASSWORD: "Ambonpati71!#"
    ports:
      - "5454:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - localNetwork

  nginx:
    container_name: hris_nginx
    image: nginx:1.19-alpine
    restart: unless-stopped
    ports:
      - "${NGINX_PORT_FORWARD:-8807}:80"
    volumes:
      - ./:/var/www/app
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - localNetwork

networks:
  localNetwork:
    driver: bridge

volumes:
  vendor_volume:
  postgres_data:
